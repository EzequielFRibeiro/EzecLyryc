services:
  - type: web
    name: cifrapartit-backend
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: cifrapartit-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: cifrapartit-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false

  - type: worker
    name: cifrapartit-worker
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && celery -A app.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cifrapartit-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: cifrapartit-redis
          property: connectionString

databases:
  - name: cifrapartit-db
    databaseName: cifrapartit
    user: cifrapartit

  - name: cifrapartit-redis
    plan: starter
